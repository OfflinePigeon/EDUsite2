<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>EDUsite | Learning Portal</title>
		<meta
			name="description"
			content="Official portal for EDUsite student activities."
		/>
		<link rel="icon" type="image/png" href="plus.png" />
		<link rel="stylesheet" href="index.css" />

		<!-- Core Proxy Scripts -->
		<script src="baremux/index.js"></script>
		<script src="uv/uv.bundle.js"></script>
		<script src="uv/uv.config.js"></script>

		<style>
			/* Smooth Entry Animation */
			@keyframes fadeInUp {
				from {
					opacity: 0;
					transform: translateY(15px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.animate-fade {
				opacity: 0;
				animation: fadeInUp 0.8s ease-out forwards;
			}

			body {
				margin: 0;
				padding: 0;
				display: flex;
				flex-direction: column;
				min-height: 100vh;
				background-color: #1a202c;
				font-family: "Inter", sans-serif;
				overflow: hidden;
			}

			/* 🟢 Hover Effect: Responsive Logo */
			.logo {
				transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
				cursor: pointer;
				display: block;
			}

			.logo:hover {
				transform: scale(1.1);
			}

			.nav-link {
				cursor: pointer;
				padding: 8px 16px;
				border-radius: 12px;
				transition: all 0.3s ease;
				color: #cbd5e0;
			}

			.nav-link:hover {
				background: #4a5568;
				color: #ffffff;
				transform: translateY(-2px);
			}
		</style>
	</head>

	<body>
		<!-- 🏠 FORCED OVERLAY: PROFESSIONAL HOME ICON -->
		<button id="home-btn" title="Return to Dashboard">
			<svg
				xmlns="http://w3.org"
				viewBox="0 0 24 24"
				width="24"
				height="24"
				fill="currentColor"
			>
				<path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
			</svg>
		</button>

		<!-- Top Navigation Bar (High Fidelity) -->
		<nav
			class="animate-fade"
			style="
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 10px 25px;
				background: #2d3748;
				font-size: 14px;
				border-radius: 20px;
				margin: 15px 20px;
				box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
				border: 1px solid #4a5568;
				z-index: 10;
				animation-delay: 0.1s;
			"
		>
			<span class="nav-link">Dashboard</span>
			<span class="nav-link">Curriculum</span>
			<span class="nav-link">Resources</span>

			<!-- User Profile Section -->
			<div
				style="
					margin-left: auto;
					display: flex;
					align-items: center;
					gap: 12px;
					background: #1a202c;
					padding: 6px 18px;
					border-radius: 18px;
					border: 1px solid #4a5568;
				"
			>
				<div class="status-dot"></div>

				<span style="font-weight: 600; color: #e2e8f0; font-size: 13px"
					>Welcome, Student</span
				>

				<div class="user-avatar-container">
					<svg
						xmlns="http://w3.org"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
						style="width: 16px; height: 16px; color: #cbd5e0"
					>
						<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
						<circle cx="12" cy="7" r="4"></circle>
					</svg>
				</div>
			</div>
		</nav>

		<!-- Main Dashboard Content -->
		<div
			class="animate-fade"
			style="
				flex-grow: 1;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				padding-bottom: 80px;
				animation-delay: 0.3s;
			"
		>
			<img
				class="logo"
				src="plus.png"
				alt="EDUsite"
				style="
					width: 240px;
					height: auto;
					border-radius: 35px;
					box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
					margin-bottom: 30px;
				"
			/>

			<h1
				style="
					text-align: center;
					margin-bottom: 8px;
					font-weight: 700;
					font-size: 2.5rem;
					color: #ffffff;
				"
			>
				EDUsite | Educational Activities
			</h1>
			<p
				style="
					color: #a0aec0;
					font-style: italic;
					font-size: 1.1rem;
					margin-bottom: 40px;
				"
			>
				Activities for the mind
			</p>

			<form
				id="uv-form"
				style="width: 100%; display: flex; justify-content: center"
			>
				<input id="uv-search-engine" value="https://google.com" type="hidden" />
				<input
					id="uv-address"
					type="text"
					placeholder="Search Lessons or Resource ID..."
					style="
						width: 550px;
						max-width: 90%;
						padding: 18px 30px;
						border-radius: 40px;
						border: 1px solid #4a5568;
						background: #2d3748;
						color: white;
						outline: none;
						font-size: 1rem;
						box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
						transition: 0.3s;
					"
				/>
			</form>
		</div>

		<!-- Professional Footer -->
		<footer
			class="animate-fade"
			style="
				padding: 20px;
				text-align: center;
				font-size: 12px;
				color: #718096;
				animation-delay: 0.5s;
			"
		>
			<p>&copy; 2026 EDUsite Systems | Secure Learning Portal</p>
		</footer>

		<!-- Full Screen Proxy Iframe -->
		<iframe id="uv-frame"></iframe>

		<!-- Core Project Scripts -->
		<script src="register-sw.js"></script>
		<script src="search.js"></script>
		<script src="index.js"></script>

		<!-- Visibility Logic (Advanced Watcher) -->
		<script>
			const frame = document.getElementById("uv-frame");
			const homeBtn = document.getElementById("home-btn");

			const updateUIVisibility = () => {
				const isGameActive =
					window.getComputedStyle(frame).display !== "none" ||
					frame.classList.contains("show");
				if (isGameActive) {
					homeBtn.style.setProperty("display", "flex", "important");
				} else {
					homeBtn.style.setProperty("display", "none", "important");
				}
			};

			const observer = new MutationObserver(updateUIVisibility);
			observer.observe(frame, {
				attributes: true,
				attributeFilter: ["style", "class"],
			});

			setInterval(updateUIVisibility, 500);

			homeBtn.addEventListener("click", () => {
				frame.style.setProperty("display", "none", "important");
				frame.classList.remove("show");
				homeBtn.style.setProperty("display", "none", "important");
				frame.src = "about:blank";
			});
		</script>
	</body>
</html>
